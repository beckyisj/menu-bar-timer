name: MenuBarTimer
options:
  bundleIdPrefix: com.menubar
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
targets:
  MenuBarTimer:
    type: application
    platform: macOS
    sources:
      - path: MenuBarTimer
        excludes:
          - "**/*.entitlements"
          - Info.plist
    settings:
      base:
        INFOPLIST_FILE: MenuBarTimer/Info.plist
        CODE_SIGN_ENTITLEMENTS: MenuBarTimer/MenuBarTimer.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.menubar.timer
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: "Menu Bar Timer"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
